configuration:
  host:
    name: Host
    description: Hostname or IP address of the remote SSH server to control.
  port:
    name: SSH port (target machine)
    description: SSH port of the remote machine you want to control — NOT this app's own MCP port (that's fixed at 3000 internally; remap it externally via this app's Network tab instead).
  user:
    name: Username
    description: SSH username used to authenticate on the remote server.
  password:
    name: Password
    description: SSH password. Leave empty when using an SSH key instead (ssh_key_path).
  ssh_key_path:
    name: SSH key path
    description: Path to a private key file, relative to /config, e.g. ssh-mcp/id_rsa.
  sudo_password:
    name: Sudo password
    description: Password used to elevate commands run via the sudo-exec tool.
  su_password:
    name: Su password
    description: Password used to open a persistent root shell via "su -".
  disable_sudo:
    name: Disable sudo-exec tool
    description: Disable the sudo-exec tool entirely, e.g. when sudo access is not available.
  timeout:
    name: Command timeout (ms)
    description: Maximum time in milliseconds a remote command may run before being aborted.
  max_chars:
    name: Max command length
    description: Maximum number of characters allowed in a command. Use "none" to disable the limit.
  api_key:
    name: API key (optional)
    description: Pin a fixed secret for the MCP endpoint. Leave empty to auto-generate one on first start — check the app's log for the ready-to-use URL.
network:
  3000/tcp: MCP HTTP endpoint
